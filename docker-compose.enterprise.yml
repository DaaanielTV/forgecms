services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-forgecms}
      MARIADB_USER: ${DB_USER:-forgecms}
      MARIADB_PASSWORD: ${DB_PASSWORD:-forgecms-change-me}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-change-me}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  forgecms-a:
    image: forgecms:latest
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      RUN_MIGRATIONS: 1
      WAIT_FOR_DB: 1
      FLASK_APP: app
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-static/uploads}
    volumes:
      - uploads_data:/app/static/uploads

  forgecms-b:
    image: forgecms:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      RUN_MIGRATIONS: 0
      WAIT_FOR_DB: 1
      FLASK_APP: app
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-static/uploads}
    volumes:
      - uploads_data:/app/static/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - forgecms-a
      - forgecms-b
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.enterprise.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro

volumes:
  mariadb_data:
  uploads_data:
